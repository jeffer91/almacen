name: Aplicar corrección final

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: correccion-final-auditoria
  cancel-in-progress: true

jobs:
  apply:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Descargar rama
        uses: actions/checkout@v4
        with:
          ref: auditoria-integridad
          fetch-depth: 0

      - name: Aplicar corrección
        run: python tools/fix-final-audit.py

      - name: Validar sintaxis
        run: |
          node --check app/main/catalog/catalog-service.js
          node --check app/main/catalog/product-entry-service.js
          node --check tests/backups.test.js
          node --check tests/migration-repair.test.js
          node --check tests/startup-profile.test.js

      - name: Guardar corrección
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add app/main/catalog/catalog-service.js app/main/catalog/product-entry-service.js tests/backups.test.js tests/migration-repair.test.js tests/startup-profile.test.js
          git commit -m "fix: corregir transacciones y pruebas de esquema"
          git push origin HEAD:auditoria-integridad
