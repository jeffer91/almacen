name: Aplicar configuración de conexiones

on:
  push:
    branches:
      - main
    paths:
      - "tools/apply-connections.py"
      - ".github/workflows/apply-connections.yml"

permissions:
  contents: write

jobs:
  apply-connections:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Descargar main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Preparar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.16.0

      - name: Aplicar integración
        run: python tools/apply-connections.py

      - name: Validar sintaxis
        shell: bash
        run: |
          set -euo pipefail
          find app tests -type f -name "*.js" -print0 | while IFS= read -r -d '' file; do
            node --check "$file"
          done

      - name: Ejecutar pruebas
        run: npm test

      - name: Guardar en main
        shell: bash
        run: |
          set -euo pipefail
          rm -f tools/apply-connections.py
          rm -f .github/workflows/apply-connections.yml
          rmdir tools 2>/dev/null || true
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "feat: configurar Firebase Supabase y Google Sheets"
          git push origin HEAD:main
