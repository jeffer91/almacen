name: Instalador de Windows

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
    paths:
      - "app/**"
      - "scripts/**"
      - "web/**"
      - "tests/**"
      - "package.json"
      - "package-lock.json"
      - "electron-builder.yml"
      - ".github/workflows/windows-installer.yml"
  push:
    branches:
      - main
    paths:
      - "app/**"
      - "scripts/**"
      - "web/**"
      - "tests/**"
      - "package.json"
      - "package-lock.json"
      - "electron-builder.yml"
      - ".github/workflows/windows-installer.yml"

permissions:
  contents: read

jobs:
  build-installer:
    name: Compilar y verificar NSIS x64
    runs-on: windows-latest
    timeout-minutes: 35

    env:
      CSC_IDENTITY_AUTO_DISCOVERY: "false"

    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4

      - name: Preparar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.16.0
          cache: npm

      - name: Instalar dependencias
        run: npm ci

      - name: Validar aplicación de Windows y web
        run: npm run release:check

      - name: Compilar instalador
        run: npm run build:win

      - name: Verificar instalador e instalación silenciosa
        shell: powershell
        run: |
          npm run verify:win *>&1 | Tee-Object -FilePath dist/verify-output.txt
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Publicar resumen de verificación
        if: success()
        shell: powershell
        run: |
          "## Instalador de Windows" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Encoding utf8 -Append
          "```json" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Encoding utf8 -Append
          Get-Content dist/installer-verification.json | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Encoding utf8 -Append
          "```" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Encoding utf8 -Append

      - name: Subir instalador y diagnóstico
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Almacen-Familiar-Windows-${{ github.sha }}
          path: |
            dist/Almacen-Familiar-Setup-*.exe
            dist/Almacen-Familiar-Setup-*.exe.blockmap
            dist/latest.yml
            dist/installer-verification.json
            dist/asar-files.txt
            dist/verify-output.txt
          if-no-files-found: error
          retention-days: 30
