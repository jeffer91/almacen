name: Aplicar actualización completa

on:
  push:
    branches:
      - feat/app-completa
    paths:
      - "tools/complete-update.part.*"
      - ".github/workflows/apply-complete-update.yml"
  pull_request:
    branches:
      - main
    types: [opened, synchronize, reopened]

permissions:
  contents: write

jobs:
  apply-update:
    if: github.head_ref == 'feat/app-completa' || github.ref_name == 'feat/app-completa'
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Descargar rama
        uses: actions/checkout@v4
        with:
          ref: feat/app-completa
          fetch-depth: 0

      - name: Preparar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.16.0

      - name: Reconstruir actualización
        shell: bash
        run: |
          set -euo pipefail
          cat tools/complete-update.part.* > /tmp/almacen-update.b64
          base64 --decode /tmp/almacen-update.b64 > /tmp/almacen-update.tar.gz
          echo "aff0ad9b6f05629bab82a6932d5c8aaf53116fce88c4ccd7d38f9c2b32ae523a  /tmp/almacen-update.tar.gz" | sha256sum --check
          tar -xzf /tmp/almacen-update.tar.gz -C .

      - name: Instalar dependencias
        run: npm install

      - name: Validar JavaScript
        shell: bash
        run: |
          set -euo pipefail
          find app tests -type f -name "*.js" -print0 | while IFS= read -r -d '' file; do
            node --check "$file"
          done

      - name: Ejecutar pruebas
        run: npm test

      - name: Guardar actualización
        shell: bash
        run: |
          set -euo pipefail
          rm -f tools/complete-update.part.00 tools/complete-update.part.01 tools/complete-update.part.02
          rm -f .github/workflows/apply-complete-update.yml
          rmdir tools 2>/dev/null || true
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No hay cambios nuevos."
            exit 0
          fi
          git commit -m "feat: completar catálogo costos precios fotos y sincronización"
          git push origin HEAD:feat/app-completa
