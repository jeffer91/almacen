name: Aplicar cambio temporal de perfil

on:
  push:
    branches:
      - fix/profile-testing
    paths:
      - "tools/apply-profile-testing.py"
      - ".github/workflows/apply-profile-testing.yml"
  pull_request:
    branches:
      - main
    types: [opened, synchronize, reopened]

permissions:
  contents: write

jobs:
  apply-profile-testing:
    if: github.head_ref == 'fix/profile-testing' || github.ref_name == 'fix/profile-testing'
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Descargar rama
        uses: actions/checkout@v4
        with:
          ref: fix/profile-testing
          fetch-depth: 0

      - name: Preparar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.16.0

      - name: Aplicar cambio
        run: python tools/apply-profile-testing.py

      - name: Validar sintaxis
        shell: bash
        run: |
          set -euo pipefail
          find app tests -type f -name "*.js" -print0 | while IFS= read -r -d '' file; do
            node --check "$file"
          done

      - name: Ejecutar pruebas
        run: npm test

      - name: Guardar cambio verificado
        shell: bash
        run: |
          set -euo pipefail
          rm -f tools/apply-profile-testing.py
          rm -f .github/workflows/apply-profile-testing.yml
          rmdir tools 2>/dev/null || true
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "fix: permitir cambio de perfil solo durante pruebas"
          git push origin HEAD:fix/profile-testing
