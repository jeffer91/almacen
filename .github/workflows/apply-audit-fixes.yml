name: Aplicar correcciones de auditoría

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: auditoria-integridad
  cancel-in-progress: true

jobs:
  apply:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Descargar rama
        uses: actions/checkout@v4
        with:
          ref: auditoria-integridad
          fetch-depth: 0

      - name: Preparar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.16.0

      - name: Aplicar parches
        run: |
          python tools/patch_core.py
          python tools/patch_commerce.py
          python tools/patch_entry.py
          python tools/patch_renderer.py
          python tools/patch_mobile.py
          python tools/patch_tests.py
          git checkout -- .github/workflows/tests.yml

      - name: Validar sintaxis
        shell: bash
        run: |
          set -euo pipefail
          find app tests web -type f -name "*.js" -print0 | while IFS= read -r -d '' file; do
            node --check "$file"
          done

      - name: Guardar código auditado
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No hay cambios nuevos para guardar."
            exit 0
          fi
          git commit -m "fix: consolidar precios y alta atómica"
          git push origin HEAD:auditoria-integridad
