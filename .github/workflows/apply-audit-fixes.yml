name: Aplicar auditoría final

on:
  push:
    branches:
      - fix/auditoria-final-v1
    paths:
      - "tools/apply-audit-fixes.py"
      - ".github/workflows/apply-audit-fixes.yml"
  pull_request:
    branches:
      - main
    types: [opened, synchronize, reopened]

permissions:
  contents: write

jobs:
  apply-audit:
    if: github.head_ref == 'fix/auditoria-final-v1' || github.ref_name == 'fix/auditoria-final-v1'
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Descargar rama
        uses: actions/checkout@v4
        with:
          ref: fix/auditoria-final-v1
          fetch-depth: 0

      - name: Preparar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.16.0

      - name: Aplicar correcciones auditadas
        shell: bash
        run: |
          python tools/apply-audit-fixes.py
          python - <<'PY'
          from pathlib import Path
          path = Path('tests/sync.test.js')
          text = path.read_text(encoding='utf-8')
          old = "?, NULL, 'retirada.jpg'"
          new = "?, 'remote://retirada.jpg', 'retirada.jpg'"
          if old not in text:
              raise SystemExit('No se encontró el dato local_path de la prueba de fotografía.')
          path.write_text(text.replace(old, new, 1), encoding='utf-8')
          PY

      - name: Validar sintaxis JavaScript
        shell: bash
        run: |
          set -euo pipefail
          find app tests -type f -name "*.js" -print0 | while IFS= read -r -d '' file; do
            node --check "$file"
          done

      - name: Ejecutar pruebas automáticas
        run: npm test

      - name: Guardar correcciones verificadas
        shell: bash
        run: |
          set -euo pipefail
          rm -f tools/apply-audit-fixes.py
          rm -f .github/workflows/apply-audit-fixes.yml
          rmdir tools 2>/dev/null || true
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "fix: completar auditoría funcional y de seguridad"
          git push origin HEAD:fix/auditoria-final-v1
