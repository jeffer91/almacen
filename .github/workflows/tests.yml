name: Pruebas automáticas

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  tests:
    name: Node.js y SQLite en ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 12

    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest

    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4

      - name: Preparar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.16.0

      - name: Ejecutar pruebas y guardar salida
        shell: bash
        run: |
          set +e
          npm test 2>&1 | tee test-output.txt
          test_status=${PIPESTATUS[0]}
          echo "$test_status" > test-exit-code.txt
          exit "$test_status"

      - name: Publicar salida de pruebas
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-output-${{ matrix.os }}
          path: |
            test-output.txt
            test-exit-code.txt
          if-no-files-found: error
          retention-days: 7
