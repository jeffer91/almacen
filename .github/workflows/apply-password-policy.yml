name: Aplicar contraseña flexible

on:
  push:
    branches:
      - main
    paths:
      - "tools/apply-password-policy.py"
      - ".github/workflows/apply-password-policy.yml"

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Descargar main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Preparar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.16.0

      - name: Aplicar cambio
        run: python tools/apply-password-policy.py

      - name: Validar sintaxis
        shell: bash
        run: |
          set -euo pipefail
          node --check app/main/admin-auth-store.js
          node --check app/renderer/app.js
          node --check tests/admin-auth.test.js

      - name: Ejecutar pruebas
        run: npm test

      - name: Guardar directamente en main
        shell: bash
        run: |
          set -euo pipefail
          rm -f tools/apply-password-policy.py
          rm -f .github/workflows/apply-password-policy.yml
          rmdir tools 2>/dev/null || true
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "fix: permitir contraseñas administrativas desde 4 caracteres"
          git push origin HEAD:main
